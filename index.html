<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expert Gestão | Plataforma Avalancha 60K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #FAF8F5; --text: #0D0D12; --muted: rgba(13,13,18,0.55);
      --surface: #FFFFFF; --border: rgba(13,13,18,0.1);
      --brand: #C9A84C; --brand-h: #b59540; --brand-t: #fff;
      --sidebar: #FFFFFF; --sidebar-w: 260px;
      --danger: #ef4444; --success: #10b981; --warn: #f59e0b;
    }
    .dark {
      --bg: #0B0B0F; --text: #F0EFE8; --muted: rgba(240,239,232,0.5);
      --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
      --brand: #C9A84C; --brand-h: #e8cd7b; --brand-t: #0B0B0F;
      --sidebar: #111116;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; transition: background .3s, color .3s; }
    #root { height: 100vh; display: flex; flex-direction: column; }
    .app-shell { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: var(--sidebar-w); background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width .3s; overflow: hidden; }
    .main-content { flex: 1; overflow-y: auto; background: var(--bg); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; border: none; cursor: pointer; transition: all .2s; }
    .btn-brand { background: var(--brand); color: var(--brand-t); } .btn-brand:hover { filter: brightness(1.1); transform: scale(1.02); }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); } .btn-ghost:hover { border-color: var(--brand); color: var(--brand); }
    .btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { filter: brightness(0.9); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: .04em; }
    .badge-hot { background: rgba(239,68,68,.12); color: var(--danger); }
    .badge-warm { background: rgba(245,158,11,.12); color: var(--warn); }
    .badge-cold { background: rgba(100,116,139,.12); color: #64748b; }
    .badge-win { background: rgba(16,185,129,.12); color: var(--success); }
    .badge-brand { background: rgba(201,168,76,.12); color: var(--brand); }
    .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
    input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 12px 16px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; width: 100%; transition: border-color .2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--brand); }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .noise { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: .025; background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)"/></svg>'); }
    @keyframes pulse-glow { 0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4)} 50%{box-shadow:0 0 0 8px rgba(201,168,76,0)} }
    @keyframes scan { 0%{top:0;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100%;opacity:0} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .4s ease forwards; }
    .kpi-critical { border-top: 3px solid var(--danger) !important; }
    .kpi-good { border-top: 3px solid var(--success) !important; }
    .kpi-warn { border-top: 3px solid var(--warn) !important; }
    .kpi-brand { border-top: 3px solid var(--brand) !important; }
    .kanban-col { min-height: 400px; transition: background .2s; }
    .kanban-col.drag-over { background: rgba(201,168,76,.06); border-color: var(--brand) !important; }
    .kanban-card { cursor: grab; transition: all .2s; user-select: none; }
    .kanban-card:active { cursor: grabbing; opacity: .7; transform: rotate(1deg) scale(1.02); }
    .kanban-card:hover { border-color: rgba(201,168,76,.4); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .crm-card { transition: all .2s; cursor: pointer; }
    .crm-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .timeline-item::before { content: ''; position: absolute; left: -25px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--brand); }
    .timeline-item { position: relative; padding-left: 20px; border-left: 2px solid var(--border); margin-left: 20px; }
    .avatar-ring { padding: 2px; border-radius: 50%; background: linear-gradient(135deg, var(--brand), transparent); }
    .stat-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--muted); transition: all .2s; margin: 2px 8px; white-space: nowrap; }
    .sidebar-item:hover { background: var(--surface); color: var(--text); }
    .sidebar-item.active { background: rgba(201,168,76,.12); color: var(--brand); font-weight: 600; }
    .sidebar-item svg { flex-shrink: 0; }
    .topbar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: var(--sidebar); flex-shrink: 0; }
    .scanner-line { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--brand); box-shadow: 0 0 10px var(--brand); animation: scan 2s linear infinite; }
    .radar-chart { display: grid; place-items: center; }
    select option { background: var(--bg); }
  </style>

  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {
      colors: { bg: 'var(--bg)', content: 'var(--text)', muted: 'var(--muted)', surface: 'var(--surface)', border: 'var(--border)', brand: 'var(--brand)', danger: 'var(--danger)', success: 'var(--success)', warn: 'var(--warn)' },
      fontFamily: { sans: ['Inter','sans-serif'], drama: ['Playfair Display','serif'] }
    }}}
  </script>
</head>
<body>
  <div class="noise"></div>
  <div id="root"></div>
  <script type="text/babel" src="components/icons.js"></script>
  <script type="text/babel" src="components/auth.js"></script>
  <script type="text/babel" src="components/sidebar.js"></script>
  <script type="text/babel" src="components/dashboard.js"></script>
  <script type="text/babel" src="components/crm.js"></script>
  <script type="text/babel" src="components/kanban.js"></script>
  <script type="text/babel" src="components/experts.js"></script>
  <script type="text/babel" src="components/clients.js"></script>
  <script type="text/babel" src="components/reports.js"></script>
  <script type="text/babel" src="components/diagnostic.js"></script>
  <script type="text/babel" src="components/settings.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
